name: Claude Agent Pipeline

on:
  # Trigger when user stories are pushed
  push:
    paths:
      - 'user-stories/**'
    branches:
      - 'feature/user-stories-*'

  # Trigger via PR events
  pull_request:
    types: [opened, synchronize]

  # Allow @claude mentions in issues/PRs
  issue_comment:
    types: [created]

  # Manual trigger
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to run (business-analyst, frontend-dev, backend-dev, qa-engineer, orchestrate)'
        required: true
        type: choice
        options:
          - orchestrate
          - business-analyst
          - frontend-dev
          - backend-dev
          - qa-engineer
      module:
        description: 'Module to process (e.g., authentication, core-hr, leave)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ============================================
  # Stage 1: Business Analysis
  # ============================================
  business-analysis:
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.agent == 'business-analyst' || inputs.agent == 'orchestrate')
    runs-on: ubuntu-latest
    outputs:
      stories-created: ${{ steps.ba.outputs.stories-created }}
      module: ${{ steps.ba.outputs.module }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Business Analyst Agent
        id: ba
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-opus-4-6
          prompt: |
            You are the @business-analyst agent. Read the agent definition at .claude/agents/team/business-analyst.md.
            Analyze docs/hrm_technical_document_v4.0.md and generate IEEE 830 user stories for module: ${{ inputs.module || 'authentication' }}.
            Write stories to user-stories/${{ inputs.module || 'authentication' }}/ directory.
            Create an INDEX.md if it doesn't exist.
          allowed_tools: "Read,Write,Glob,Grep,Bash"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit User Stories
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          BRANCH="feature/user-stories-${{ inputs.module || 'authentication' }}"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add user-stories/
          git commit -m "docs(user-stories): add ${{ inputs.module || 'authentication' }} user stories [IEEE 830]

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>" || echo "No changes"
          git push origin "$BRANCH" --force-with-lease
          echo "stories-created=true" >> "$GITHUB_OUTPUT"
          echo "module=${{ inputs.module || 'authentication' }}" >> "$GITHUB_OUTPUT"

      - name: Create PR for User Stories
        if: steps.ba.outputs.stories-created == 'true'
        run: |
          gh pr create \
            --title "docs: IEEE 830 user stories for ${{ inputs.module || 'authentication' }}" \
            --body "## User Stories Generated

          Module: \`${{ inputs.module || 'authentication' }}\`
          Standard: IEEE 830-1998 / ISO/IEC/IEEE 29148

          Generated by \`@business-analyst\` agent.

          **Next:** Merging this PR triggers the dev + QA pipeline." \
            --label "user-stories,ieee-830" \
            --base main || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Stage 2: Parallel Dev + QA (after stories merged)
  # ============================================
  frontend-dev:
    if: >
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'user-stories')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.agent == 'frontend-dev' || inputs.agent == 'orchestrate'))
    runs-on: ubuntu-latest
    needs: [business-analysis]
    if: always() && (needs.business-analysis.result == 'success' || needs.business-analysis.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Run Frontend Dev Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-opus-4-6
          prompt: |
            You are the @frontend-dev agent. Read the agent definition at .claude/agents/team/frontend-dev.md.
            Read user stories from user-stories/${{ inputs.module || 'authentication' }}/ directory.
            Implement the Angular 20 frontend components for these stories.
            Write code to src/frontend/ following the architecture in the agent definition.
          allowed_tools: "Read,Write,Edit,Glob,Grep,Bash"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit & Push Frontend Code
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          BRANCH="feature/frontend-${{ inputs.module || 'authentication' }}"
          git checkout -b "$BRANCH"
          git add src/frontend/
          git commit -m "feat(frontend/${{ inputs.module || 'authentication' }}): implement UI components

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>" || echo "No changes"
          git push origin "$BRANCH" --force-with-lease

      - name: Create Frontend PR
        run: |
          gh pr create \
            --title "feat(frontend): ${{ inputs.module || 'authentication' }} UI components" \
            --body "## Frontend Implementation

          Module: \`${{ inputs.module || 'authentication' }}\`
          Stack: Angular 20 + TypeScript + Angular Material + Tailwind

          Generated by \`@frontend-dev\` agent from IEEE 830 user stories." \
            --label "frontend,angular" \
            --base main || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-dev:
    if: always() && (needs.business-analysis.result == 'success' || needs.business-analysis.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [business-analysis]
    steps:
      - uses: actions/checkout@v4

      - name: Run Backend Dev Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-opus-4-6
          prompt: |
            You are the @backend-dev agent. Read the agent definition at .claude/agents/team/backend-dev.md.
            Read user stories from user-stories/${{ inputs.module || 'authentication' }}/ directory.
            Implement the ASP.NET Core 10 backend for these stories.
            Write code to src/backend/ following Clean Architecture.
          allowed_tools: "Read,Write,Edit,Glob,Grep,Bash"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit & Push Backend Code
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          BRANCH="feature/backend-${{ inputs.module || 'authentication' }}"
          git checkout -b "$BRANCH"
          git add src/backend/
          git commit -m "feat(backend/${{ inputs.module || 'authentication' }}): implement API and business logic

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>" || echo "No changes"
          git push origin "$BRANCH" --force-with-lease

      - name: Create Backend PR
        run: |
          gh pr create \
            --title "feat(backend): ${{ inputs.module || 'authentication' }} API" \
            --body "## Backend Implementation

          Module: \`${{ inputs.module || 'authentication' }}\`
          Stack: ASP.NET Core 10 + EF Core + PostgreSQL + MediatR

          Generated by \`@backend-dev\` agent from IEEE 830 user stories." \
            --label "backend,dotnet" \
            --base main || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  qa-engineer:
    if: always() && (needs.business-analysis.result == 'success' || needs.business-analysis.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [business-analysis]
    steps:
      - uses: actions/checkout@v4

      - name: Run QA Engineer Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-opus-4-6
          prompt: |
            You are the @qa-engineer agent. Read the agent definition at .claude/agents/team/qa-engineer.md.
            Read user stories from user-stories/${{ inputs.module || 'authentication' }}/ directory.
            Write IEEE 829 test cases to test-cases/${{ inputs.module || 'authentication' }}/ directory.
            Create TEST-MATRIX.md and update TRACEABILITY-MATRIX.md.
          allowed_tools: "Read,Write,Glob,Grep,Bash"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit & Push Test Cases
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          BRANCH="feature/qa-${{ inputs.module || 'authentication' }}"
          git checkout -b "$BRANCH"
          git add test-cases/
          git commit -m "test(qa/${{ inputs.module || 'authentication' }}): add IEEE 829 test cases

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>" || echo "No changes"
          git push origin "$BRANCH" --force-with-lease

      - name: Create QA PR
        run: |
          gh pr create \
            --title "test(qa): ${{ inputs.module || 'authentication' }} test cases [IEEE 829]" \
            --body "## QA Test Cases

          Module: \`${{ inputs.module || 'authentication' }}\`
          Standard: IEEE 829 / ISO/IEC/IEEE 29119

          Generated by \`@qa-engineer\` agent from IEEE 830 user stories." \
            --label "qa,test-cases,ieee-829" \
            --base main || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Stage 3: Integration Summary
  # ============================================
  integration-check:
    runs-on: ubuntu-latest
    needs: [frontend-dev, backend-dev, qa-engineer]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate Pipeline Summary
        run: |
          echo "## Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Dev | ${{ needs.frontend-dev.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Dev | ${{ needs.backend-dev.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| QA Engineer | ${{ needs.qa-engineer.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Module: \`${{ inputs.module || 'authentication' }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create Integration Issue
        if: needs.frontend-dev.result == 'success' && needs.backend-dev.result == 'success'
        run: |
          gh issue create \
            --title "Integration: verify ${{ inputs.module || 'authentication' }} frontend + backend alignment" \
            --body "All agents completed for module \`${{ inputs.module || 'authentication' }}\`.

          ## Checklist
          - [ ] Frontend API calls match backend endpoints
          - [ ] DTOs/interfaces are consistent
          - [ ] Test cases cover integration points
          - [ ] Multi-tenant isolation verified" \
            --label "integration,review" || echo "Issue creation skipped"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
